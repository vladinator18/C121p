<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C121p | Immersive Gallery</title>
    <link rel="stylesheet" href="Css/Style.css"> 
</head>
<body class="gallery-page">

    <div id="nav-overlay"></div>

    <svg class="brand-logo-fixed" viewBox="0 0 198 203" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="99" cy="97" r="50" fill="#D9D9D9"/>
        <path d="M83 143.5L73 142L91.7 75.5L115.9 77L128.9 142L119.9 143.5L113 126.9L86.4 129.1L83 143.5ZM110.8 121.6L96.9 88.1H96.1L88.2 121.4L110.8 121.6Z" fill="black"/>
    </svg>

    <div class="nav-toggle" id="nav-toggle">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav class="main-sidebar" id="main-sidebar">
        <div class="sidebar-header">MENU</div>
        <a href="../../index.html">Home</a>
        <a href="Gallery.html" class="active">Exhibitions</a>
        <a href="../Author/Author.html">Artists</a> 
        <a href="../Contact/Contact.html">Inquiries</a>
    </nav>

    <div id="lightbox">
        <img src="" alt="Zoomed View">
    </div>

    <main>
        <header>
            <h2>ART ARCHIVE</h2>
            <div class="categories">
                <button class="filter-btn active" onclick="filterGallery('all')">All</button>
                <button class="filter-btn" onclick="filterGallery('cubism')">Cubism</button>
                <button class="filter-btn" onclick="filterGallery('impressionism')">Impressionism</button>
                <button class="filter-btn" onclick="filterGallery('realism')">Realism</button>
            </div>
        </header>

        <section class="galleries" id="galleryGrid">
            <article class="gallery" data-category="cubism">
                <div class="gallery__images-thumbnail">
                    <p>Pablo Picasso</p>
                    <img src="Art-picasso/Avignon.jpg" class="zoomable" alt="Avignon">
                </div>
                <div class="gallery__images-more">
                    <img src="Art-picasso/Dove_lithograph_by_Picasso.jpg" class="zoomable" alt="Dove">
                    <img src="Art-picasso/girlbfremrr.jpg" class="zoomable" alt="Girl before mirror">
                    <img src="Art-picasso/Old_guitarist_chicago.jpg" class="zoomable" alt="Old Guitarist">
                </div>
                <div class="gallery__info">
                    <span class="style-tag">Cubism</span>
                </div>
            </article>

            <article class="gallery" data-category="impressionism">
                <div class="gallery__images-thumbnail">
                    <p>Vincent Van-Gogh</p>
                    <img src="Art-goph/Bloosoms.jpg" class="zoomable" alt="Blossoms">
                </div>
                <div class="gallery__images-more">
                    <img src="Art-goph/Cafetratnight.jpg" class="zoomable" alt="Cafe Terrace">
                    <img src="Art-goph/Potatoetr.jpg" class="zoomable" alt="Potato Eaters">
                    <img src="Art-goph/Starry%20night%20jpg.jpg" class="zoomable" alt="Starry Night">
                </div>
                <div class="gallery__info">
                    <span class="style-tag">Impressionism</span>
                </div>
            </article>
        </section>
    </main>

    <footer>
        <p>CODEDESTROYERS | ITS121p | 2026</p>
    </footer>

    <script>

        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('nav-links');
        const overlay = document.getElementById('overlay');

        function toggleMenu() {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
            overlay.classList.toggle('active');
            
            // Prevent scrolling on the main page when sidebar is open
            if (navLinks.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }

        hamburger.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        // Close menu when a link is clicked
        const links = document.querySelectorAll('.nav-links li a');
        links.forEach(link => {
            link.addEventListener('click', () => {
                if(navLinks.classList.contains('active')) toggleMenu();
            });
        });
    </script>
</body>
</html>
