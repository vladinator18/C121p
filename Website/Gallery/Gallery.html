<!DOCTYPE html>
<html lang="en">
<head>

  <title>Art Gallery</title>

</head>
<body>
  <main>
    <!-- logo -->
    <img src="./img/art1.jpg" alt="Brand Logo" class="brand-logo">
    <h2>Art Gallery </h2>
      <nav>
      <ul class="categories">
        <li><a href="index.html"class="category">Home</a></li>

        <li><a href="contact"class="category">Contact</a></li>

      <section class="galleries">
        <article class="gallery">
          <div class="gallery__images">
            <div class="gallery__images-thumbnail">
              <div>
                <p>Pablo Picasso</p>
                <img src="./img/art1.jpg" alt="Art 1">
              </div>
            </div>
          </div>
          <div class="gallery__images-more">
            <div>
              <img src="./img/art2.jpg" alt="Art 2">
              <img src="./img/art3.jpg" alt="Art 3">
              <img src="./img/art4.jpg" alt="Art 4">
            </div>
          </div>
          <div class="gallery__info">
            <p>Cubism</p>
          </div>
        </article>
        <article class="gallery">
          <div class="gallery__images">
            <div class="gallery__images-thumbnail">
              <div>
                <p>Vincent Van-Gogh</p>
                <img src="./img/stock1.jpg" alt="Stock 1">
              </div>
            </div>
          </div>
          <div class="gallery__images-more">
            <div>
              <img src="./img/stock2.jpg" alt="Stock 2">
              <img src="./img/stock3.jpg" alt="Stock 3">
              <img src="./img/stock4.jpg" alt="Stock 4">
            </div>
          </div>
          <div class="gallery__info">
            <p>Post-Impressionism</p>
          </div>
        </article>
        <article class="gallery">
          <div class="gallery__images">
            <div class="gallery__images-thumbnail">
              <div>
                <p>Fernando Amorsolo</p>
                <img src="./img/ex1.jpg" alt="Example 1">
              </div>
            </div>
          </div>
          <div class="gallery__images-more">
            <div>
              <img src="./img/ex2.jpeg" alt="Ex 2">
              <img src="./img/ex3.jpg" alt="Ex 3">
              <img src="./img/ex4.jpg" alt="Ex 4">
            </div>
          </div>
          <div class="gallery__info">
            <!-- lowk idk what to put for dis guy -->
            <p>Realism</p>
          </div>
        </article>
      </section>
  </main>
  <footer>
    <p>CodeDestroyers | ITS-121L AM11</p>
  </footer>
