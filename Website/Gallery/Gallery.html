<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C121p | Immersive Gallery</title>
    <link rel="stylesheet" href="Css/Style.css">
</head>
<body class="gallery-page">

    <div id="nav-overlay"></div>

    <svg class="brand-logo-fixed" viewBox="0 0 198 203" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="99" cy="97" r="50" fill="#D9D9D9"/>
        <path d="M83 143.5L73 142L91.7 75.5L115.9 77L128.9 142L119.9 143.5L113 126.9L86.4 129.1L83 143.5ZM110.8 121.6L96.9 88.1H96.1L88.2 121.4L110.8 121.6Z" fill="black"/>
    </svg>

    <div class="nav-toggle" id="nav-toggle">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav class="main-sidebar" id="main-sidebar">
        <div class="sidebar-header">MENU</div>
        <a href="index.html">Home</a>
        <a href="Website/Gallery/Gallery.html" class="active">Exhibitions</a>
        <a href="Website/Author/Author.html">Artists</a>
        <a href="Website/Contact/Contact.html">Inquiries</a>
    </nav>

    <div id="lightbox">
        <img src="" alt="Zoomed View">
    </div>

    <main>
        <header>
            <h2>ART ARCHIVE</h2>
            <div class="categories">
                <button class="filter-btn active" onclick="filterGallery('all')">All</button>
                <button class="filter-btn" onclick="filterGallery('cubism')">Cubism</button>
                <button class="filter-btn" onclick="filterGallery('impressionism')">Impressionism</button>
                <button class="filter-btn" onclick="filterGallery('realism')">Realism</button>
            </div>
        </header>

        <section class="galleries" id="galleryGrid">
            <article class="gallery" data-category="cubism">
                <div class="gallery__images-thumbnail">
                    <p>Pablo Picasso</p>
                    <img src="Art-picasso/Avignon.jpg" class="zoomable">
                </div>
                <div class="gallery__images-more">
                    <img src="Art-picasso/Dove_lithograph_by_Picasso.jpg" class="zoomable">
                    <img src="Art-picasso/girlbfremrr.jpg" class="zoomable">
                    <img src="Art-picasso/Old_guitarist_chicago.jpg" class="zoomable">
                </div>
                <div class="gallery__info">
                    <span class="style-tag">Cubism</span>
                </div>
            </article>
        </section>
    </main>

    <footer>
        <p>CODEDESTROYERS | ITS121p | 2026</p>
    </footer>

    <script>
        // --- SIDEBAR LOGIC ---
        const navToggle = document.getElementById('nav-toggle');
        const mainSidebar = document.getElementById('main-sidebar');
        const overlay = document.getElementById('nav-overlay');

        function toggleMenu() {
            navToggle.classList.toggle('active');
            mainSidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.style.overflow = mainSidebar.classList.contains('active') ? 'hidden' : 'auto';
        }

        navToggle.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        // --- FILTER LOGIC ---
        function filterGallery(category) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === category) btn.classList.add('active');
                if(category === 'all' && btn.innerText.toLowerCase() === 'all') btn.classList.add('active');
            });

            const items = document.querySelectorAll('.gallery');
            items.forEach(item => {
                if (category === 'all' || item.getAttribute('data-category') === category) {
                    item.classList.remove('hidden');
                    item.style.opacity = '1';
                } else {
                    item.classList.add('hidden');
                }
            });
        }

        // --- LIGHTBOX ZOOM ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = lightbox.querySelector('img');

        document.querySelectorAll('.zoomable').forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
        });

        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('active');
            if (!mainSidebar.classList.contains('active')) document.body.style.overflow = 'auto';
        });
    </script>
</body>
</html>
