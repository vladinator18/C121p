<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C121p | Immersive Gallery</title>
    <link rel="stylesheet" href="Css\Style.css">
</head>
 
<body>

    <svg class="brand-logo-fixed" viewBox="0 0 198 203" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="99" cy="97" r="50" fill="#D9D9D9"/>
        <path d="M83 143.5L73 142L91.7 75.5L115.9 77L128.9 142L119.9 143.5L113 126.9L86.4 129.1L83 143.5ZM110.8 121.6L96.9 88.1H96.1L88.2 121.4L110.8 121.6Z" fill="black"/>
    </svg>

    <div id="lightbox">
        <img src="" alt="Zoomed View">
    </div>

    <main>
        <header>
            <h2>ART ARCHIVE</h2>
            <nav>
                <div class="categories">
                    <button class="filter-btn active" onclick="filterGallery('all')">All</button>
                    <button class="filter-btn" onclick="filterGallery('cubism')">Cubism</button>
                    <button class="filter-btn" onclick="filterGallery('impressionism')">Impressionism</button>
                    <button class="filter-btn" onclick="filterGallery('realism')">Realism</button>
                </div>
            </nav>
        </header>

        <section class="galleries" id="galleryGrid">
            <article class="gallery" data-category="cubism">
                <div class="gallery__images-thumbnail">
                    <p>Pablo Picasso</p>
                    <img src="Art-picasso/Avignon.jpg" class="zoomable">
                </div>
                <div class="gallery__images-more">
                    <img src="Art-picasso/Dove_lithograph_by_Picasso.jpg" class="zoomable">
                    <img src="Art-picasso/girlbfremrr.jpg" class="zoomable">
                    <img src="Art-picasso/Old_guitarist_chicago.jpg" class="zoomable">
                </div>
                <div class="gallery__info">
                    <span class="style-tag">Cubism</span>
                </div>
            </article>

            <article class="gallery" data-category="impressionism">
                <div class="gallery__images-thumbnail">
                    <p>Vincent Van-Gogh</p>
                    <img src="Art-goph/Bloosoms.jpg" class="zoomable">
                </div>
                <div class="gallery__images-more">
                    <img src="Art-goph/Cafetratnight.jpg" class="zoomable">
                    <img src="Art-goph/Potatoetr.jpg" class="zoomable">
                    <img src="Art-goph/wheat and crows.jpg" class="zoomable">
                </div>
                <div class="gallery__info">
                    <span class="style-tag">Impressionism</span>
                </div>
            </article>

            <article class="gallery" data-category="realism">
                <div class="gallery__images-thumbnail">
                    <p>Fernando Amorsolo</p>
                    <img src="Art- Amorsolo/Bombing.jpg" class="zoomable">
                </div>
                <div class="gallery__images-more">
                    <img src="Art- Amorsolo/Buriningofmnl.jpg"zoomable">
                    <img src="Art- Amorsolo/Dalagang bukid.jpg" class="zoomable">
                    <img src="Art- Amorsolo/Makingoflag.jpg" class="zoomable">
                </div>
                <div class="gallery__info">
                    <span class="style-tag">Realism</span>
                </div>
            </article>
        </section>
    </main>

    <footer>
        <p>CODEDESTROYERS | ITS121p | 2026</p>
    </footer>

    <script>
        // --- FILTER LOGIC ---
        function filterGallery(category) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === category) btn.classList.add('active');
                if(category === 'all' && btn.innerText.toLowerCase() === 'all') btn.classList.add('active');
            });

            const items = document.querySelectorAll('.gallery');
            items.forEach(item => {
                item.style.opacity = '0';
                item.style.transform = 'translateY(10px)';

                setTimeout(() => {
                    if (category === 'all' || item.getAttribute('data-category') === category) {
                        item.classList.remove('hidden');
                        item.style.opacity = '1';
                        item.style.transform = 'translateY(0)';
                    } else {
                        item.classList.add('hidden');
                    }
                }, 300);
            });
        }

        // --- ZOOM LOGIC ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = lightbox.querySelector('img');

        document.querySelectorAll('.zoomable').forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden'; // Stop scrolling
            });
        });

        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto'; // Resume scrolling
        });
    </script>
</body>
</html>
