<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact | C121p Gallery</title>
    <link rel="stylesheet" href="Css/Contact.css">
</head>
<body>

    <aside class="sidebar-info">
        <div class="brand-box">
            <svg class="sidebar-logo" viewBox="0 0 198 203" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="99" cy="97" r="50" fill="#ceb4a9"/>
                <path d="M83 143.5L73 142L91.7 75.5L115.9 77L128.9 142L119.9 143.5L113 126.9L86.4 129.1L83 143.5ZM110.8 121.6L96.9 88.1H96.1L88.2 121.4L110.8 121.6Z" fill="#640f28"/>
            </svg>
            <h2>C121p</h2>
        </div>

        <div class="info-section">
            <h3 class="section-title">Gallery Location</h3>
            <p>Roxas Avenue, University of the Philippines Diliman, Quezon City.</p>
        </div>

        <div class="info-section">
            <h3 class="section-title">Opening Hours</h3>
            <table class="hours-table">
                <tbody>
                    <tr><td>Monday</td><td>Closed</td></tr>
                    <tr><td>Tue – Fri</td><td>10AM – 6PM</td></tr>
                    <tr><td>Saturday</td><td>11AM – 7PM</td></tr>
                    <tr><td>Sunday</td><td>11AM – 4PM</td></tr>
                </tbody>
            </table>
            <p class="disclaimer">Last entry is 30 mins before closing.</p>
        </div>
    </aside>

    <main class="form-container">
        <header class="form-header">
            <h1>CONTACT US</h1>
            <div class="accent-line"></div>
        </header>

        <form id="contactForm">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Juan Dela Cruz" required>
            </div>

            <div class="input-group">
                <label for="phoneNo">Phone Number</label>
                <input type="tel" id="phoneNo" name="phoneNo" placeholder="000-000-0000" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" required>
            </div>

            <div class="input-group">
                <label for="email">Gmail Address</label>
                <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
            </div>

            <div class="input-group">
                <label for="comments">Message / Inquiry</label>
                <textarea id="comments" name="comments" rows="4" placeholder="How can we help you?"></textarea>
            </div>

            <button type="submit" class="submit-btn">SEND MESSAGE</button>
        </form>
    </main>

    <footer class="main-footer">
        <div class="footer-wrap">
            <p>AM11 - CODEDESTROYERS | 2026</p>
    
    </footer>

</body>
</html>
